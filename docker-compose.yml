version: "3.9"

# ChessBots Backend Services
# Usage:
#   docker compose up              # Start all services
#   docker compose up -d           # Start detached
#   docker compose logs -f         # Follow logs
#   docker compose down            # Stop all

services:
  chess-engine:
    build:
      context: .
      dockerfile: services/chess-engine/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3002}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  agent-gateway:
    build:
      context: .
      dockerfile: services/agent-gateway/Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      chess-engine:
        condition: service_healthy
    environment:
      GATEWAY_PORT: "3002"
      GATEWAY_HOST: "0.0.0.0"
      CHESS_ENGINE_URL: http://chess-engine:3001
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      MONAD_RPC: ${MONAD_RPC:-https://rpc.monad.xyz/}
      MONAD_CONTRACT: ${MONAD_CONTRACT:-0xCB030eE8Ee385f91F4372585Fe1fa3147FA192B8}
    restart: unless-stopped

  tournament-orchestrator:
    build:
      context: .
      dockerfile: services/tournament-orchestrator/Dockerfile
    depends_on:
      chess-engine:
        condition: service_healthy
    environment:
      CHESS_ENGINE_URL: http://chess-engine:3001
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      MONAD_RPC: ${MONAD_RPC:-https://rpc.monad.xyz/}
      MONAD_CONTRACT: ${MONAD_CONTRACT:-0xCB030eE8Ee385f91F4372585Fe1fa3147FA192B8}
      MONAD_USDC: ${MONAD_USDC:-0x754704Bc059F8C67012fEd69BC8A327a5aafb603}
      CHESS_TOKEN: ${CHESS_TOKEN:-0xC138bA72CE0234448FCCab4B2208a1681c5BA1fa}
      CHESS_STAKING: ${CHESS_STAKING:-0xf242D07Ba9Aed9997c893B515678bc468D86E32C}
      PRIVATE_KEY: ${PRIVATE_KEY}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-10000}
    restart: unless-stopped
