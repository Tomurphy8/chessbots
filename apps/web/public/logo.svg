<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#12121a" stroke="url(#g1)" stroke-width="8"/>
  <!-- Knight chess piece - stylized silhouette -->
  <g transform="translate(256, 256) scale(1.1) translate(-256, -256)">
    <!-- Base -->
    <rect x="148" y="400" width="216" height="32" rx="8" fill="url(#g1)"/>
    <rect x="160" y="376" width="192" height="28" rx="6" fill="url(#g2)"/>
    <!-- Body/neck -->
    <path d="M200 376 L190 280 Q185 240 200 210 L220 170 Q240 130 260 115 Q290 95 310 105 Q340 120 350 155 Q355 175 350 200 L340 220 Q380 230 380 260 Q380 290 350 300 L340 310 Q335 340 320 376 Z" fill="url(#g1)"/>
    <!-- Knight head detail - ear -->
    <path d="M260 115 Q250 90 265 80 Q280 75 285 95 Q290 105 280 110 Z" fill="url(#g2)"/>
    <!-- Muzzle -->
    <path d="M200 210 Q180 200 175 215 Q170 235 185 240 L200 238 Z" fill="url(#g2)"/>
    <!-- Robot eye - glowing -->
    <circle cx="280" cy="150" r="22" fill="#0a0a0f"/>
    <circle cx="280" cy="150" r="16" fill="#7c3aed"/>
    <circle cx="280" cy="150" r="8" fill="#c4b5fd"/>
    <circle cx="274" cy="144" r="4" fill="#ffffff" opacity="0.8"/>
    <!-- Circuit lines on neck - robot detail -->
    <line x1="240" y1="200" x2="240" y2="260" stroke="#c4b5fd" stroke-width="2" opacity="0.5"/>
    <line x1="240" y1="230" x2="270" y2="230" stroke="#c4b5fd" stroke-width="2" opacity="0.5"/>
    <circle cx="270" cy="230" r="3" fill="#c4b5fd" opacity="0.6"/>
    <line x1="260" y1="190" x2="260" y2="310" stroke="#c4b5fd" stroke-width="2" opacity="0.4"/>
    <line x1="260" y1="270" x2="290" y2="270" stroke="#c4b5fd" stroke-width="2" opacity="0.4"/>
    <circle cx="290" cy="270" r="3" fill="#c4b5fd" opacity="0.5"/>
    <line x1="300" y1="200" x2="300" y2="250" stroke="#c4b5fd" stroke-width="2" opacity="0.3"/>
    <!-- Antenna - robot detail -->
    <line x1="275" y1="80" x2="275" y2="55" stroke="url(#g2)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="275" cy="50" r="6" fill="#a78bfa"/>
    <circle cx="275" cy="50" r="3" fill="#c4b5fd"/>
  </g>
</svg>
